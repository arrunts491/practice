apiVersion: apps/v1
kind: Deployment
metadata:
  name: practice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: practice
  template:
    metadata:
      labels:
        app: practice
    spec:
      containers:
      - name: practice
        image: arrun369/practice:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: practice-service
spec:
  type: NodePort
  selector:
    app: practice
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30020
