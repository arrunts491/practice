<!DOCTYPE html>
<html>
<head>
    <title>My Profile</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .card {
            background: white;
            width: 350px;
            margin: 80px auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
        }

        .profile-img {
            width: 100px;
            border-radius: 50%;
        }

        h1 {
            color: #333;
        }

        p {
            font-size: 16px;
            color: #555;
        }

        .highlight {
            font-weight: bold;
            color: #2c3e50;
        }

        .skills {
            margin-top: 10px;
        }

        .skills span {
            background: #3498db;
            color: white;
            padding: 5px 10px;
            border-radius: 10px;
            margin: 5px;
            display: inline-block;
        }
    </style>
</head>

<body>

    <div class="card">
        <img src="https://via.placeholder.com/100" class="profile-img">

        <h1>My Profile</h1>

        <p><span class="highlight">Name:</span> ARRUN T S</p>
        <p><span class="highlight">Register Number:</span> 23MIS0038</p>
        <p><span class="highlight">Course:</span> Agile Development Process & DevOps Lab</p>
        <p><span class="highlight">College:</span> VIT</p>

        <div class="skills">
            <p><span class="highlight">Skills:</span></p>
            <span>Docker</span>
            <span>Jenkins</span>
            <span>Kubernetes</span>
            <span>GitHub</span>
        </div>

        <p><span class="highlight">Email:</span> arrun@example.com</p>
    </div>

</body>
</html>
